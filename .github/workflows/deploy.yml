name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: api-gateway
            context: ./backend/api-gateway/gateway
          - service: auth-service
            context: ./backend/auth-service/auth
          - service: group-service
            context: ./backend/group-service
          - service: requirement-service
            context: ./backend/requirement-service/requirement
          - service: task-service
            context: ./backend/task-service/task
          - service: notification-service
            context: ./backend/notification-service/notification
          - service: report-service
            context: ./backend/report-service/report
          - service: github-service
            context: ./backend/github-service/github
          - service: jira-service
            context: ./backend/jira-service/jira
          - service: export-service
            context: ./backend/export-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_rsa_key
          chmod 600 deploy_rsa_key
          
          ssh -i deploy_rsa_key -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'
            mkdir -p ~/app
            cd ~/app
            
            # Update code
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
            
            cd backend
            # Cleanup and prepare .env
            docker compose down --remove-orphans || true
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
            
            # Login and Deploy
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            
            echo "🚀 Deployment successfully finalized over Nginx!"
          EOF
