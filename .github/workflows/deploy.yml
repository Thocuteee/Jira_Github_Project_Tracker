name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Use the repository name for the image namespace
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: api-gateway
            context: ./backend/api-gateway/gateway
          - service: auth-service
            context: ./backend/auth-service/auth
          - service: group-service
            context: ./backend/group-service
          - service: requirement-service
            context: ./backend/requirement-service/requirement
          - service: task-service
            context: ./backend/task-service/task
          - service: notification-service
            context: ./backend/notification-service/notification
          - service: report-service
            context: ./backend/report-service/report
          - service: github-service
            context: ./backend/github-service/github
          - service: jira-service
            context: ./backend/jira-service/jira
          - service: export-service
            context: ./backend/export-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (needed for docker-compose file)
        uses: actions/checkout@v4

      - name: Deploy to VPS (Raw SSH Debug)
        run: |
          # Lưu private key ra file tạm
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key
          chmod 600 deploy_key
          
          # Thử kết nối bằng lệnh SSH nguyên bản với chế độ Verbose (-v)
          ssh -v -i deploy_key -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} "echo '✅ Raw SSH Connection Successful!'"

