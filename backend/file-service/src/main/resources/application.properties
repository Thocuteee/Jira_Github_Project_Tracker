spring.application.name=file-service
server.port=${SERVER_PORT:8090}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/file_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cloudflare R2
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:https://dummy.r2.cloudflarestorage.com}
cloudflare.r2.public-domain=${CLOUDFLARE_R2_PUBLIC_DOMAIN:dummy.pub-domain.com}
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY:dummy-access-key}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY:dummy-secret-key}
cloudflare.r2.bucket-name=${CLOUDFLARE_R2_BUCKET_NAME:jira-project-tracker}

# JWT
jwt.secret=${JWT_SECRET_KEY}
