logging.level.uth.edu.task.client=DEBUG


spring.application.name=task-service
server.port=${SERVER_PORT:8084}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ
#spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES}

# Cloudflare R2
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:https://dummy-endpoint.com}
cloudflare.r2.public-domain=${CLOUDFLARE_R2_PUBLIC_DOMAIN:dummy-domain.com}
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY:dummy-access-key}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY:dummy-secret-key}
cloudflare.r2.bucket-name=${CLOUDFLARE_R2_BUCKET_NAME:dummy-bucket}

# JWT
jwt.secret=${JWT_SECRET_KEY:${JWT_SECRET:dev-secret-change-me}}