services:
  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_GATEWAY_URL: http://localhost
        VITE_AUTH_SERVICE_URL: http://localhost/api/auth
        VITE_GROUP_SERVICE_URL: http://localhost/api/groups
        VITE_REQUIREMENT_SERVICE_URL: http://localhost/api/requirements
        VITE_TASK_SERVICE_URL: http://localhost/api/tasks
        VITE_REPORT_SERVICE_URL: http://localhost/api/reports
        VITE_NOTIFICATION_SERVICE_URL: http://localhost/api/notifications
        VITE_GITHUB_SERVICE_URL: http://localhost/api/github
        VITE_JIRA_SERVICE_URL: http://localhost/api/jira
        VITE_EXPORT_SERVICE_URL: http://localhost/api/export
    ports:
      - "5173:80"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LOCAL_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASS:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ĐÂY LÀ CONTAINER ĐẶC NHIỆM TỰ TẠO DB TRONG 1 FILE DUY NHẤT
  db-init:
    image: postgres:16-alpine
    container_name: db-init
    environment:
      PGPASSWORD: ${LOCAL_DB_PASS:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Bat dau tao cac Database...';
      for db in auth_db group_db requirement_db task_db report_db notification_db github_db jira_db export_db; do
        psql -h postgres -U ${LOCAL_DB_USER:-postgres} -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = '$$db'\" | grep -q 1 || psql -h postgres -U ${LOCAL_DB_USER:-postgres} -d postgres -c \"CREATE DATABASE $$db\";
      done;
      echo 'Khoi tao Database thanh cong!';
      "

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build: ./auth-service/auth
    container_name: auth-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      FRONTEND_URL: http://localhost
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres
      - rabbitmq

  group-service:
