# =========================================================================
# SECURITY NOTE: No hardcoded secrets or defaults allowed in this file.
# All passwords and tokens are sourced via environment variables.
# Usage: docker compose --env-file .env.local -f docker-compose.dev.yml up
# =========================================================================
services:
  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_GATEWAY_URL: http://localhost
        VITE_AUTH_SERVICE_URL: http://localhost/api/auth
        VITE_GROUP_SERVICE_URL: http://localhost/api/groups
        VITE_REQUIREMENT_SERVICE_URL: http://localhost/api/requirements
        VITE_TASK_SERVICE_URL: http://localhost/api/tasks
        VITE_REPORT_SERVICE_URL: http://localhost/api/reports
        VITE_NOTIFICATION_SERVICE_URL: http://localhost/api/notifications
        VITE_GITHUB_SERVICE_URL: http://localhost/api/github
        VITE_JIRA_SERVICE_URL: http://localhost/api/jira
        VITE_EXPORT_SERVICE_URL: http://localhost/api/export
    ports:
      - "5173:80"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: ${LOCAL_DB_USER}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ĐÂY LÀ CONTAINER ĐẶC NHIỆM TỰ TẠO DB TRONG 1 FILE DUY NHẤT
  db-init:
    image: postgres:16-alpine
    container_name: db-init
    environment:
      PGPASSWORD: ${LOCAL_DB_PASS}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Bat dau tao cac Database...';
      for db in auth_db group_db requirement_db task_db report_db notification_db github_db jira_db export_db file_db; do
        psql -h postgres -U ${LOCAL_DB_USER} -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = '$$db'\" | grep -q 1 || psql -h postgres -U ${LOCAL_DB_USER} -d postgres -c \"CREATE DATABASE $$db\";
      done;
      echo 'Khoi tao Database thanh cong!';
      "

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"


  auth-service:
    build: ./auth-service/auth
    container_name: auth-service
    ports:
      - "8081:8081"
    env_file:
      - .env.local
    environment:
      FRONTEND_URL: http://localhost
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started

  group-service:
    build: ./group-service
    container_name: group-service
    ports:
      - "8082:8082"
    env_file:
      - .env.local
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/group_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started

  requirement-service:
    build: ./requirement-service/requirement
    container_name: requirement-service
    ports:
      - "8083:8083"
    env_file:
      - .env.local
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/requirement_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db-init:
        condition: service_completed_successfully

  task-service:
    build: ./task-service/task
    container_name: task-service
    ports:
      - "8084:8084"
    env_file:
      - .env.local
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/task_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started

  report-service:
    build: ./report-service/report
    container_name: report-service
    ports:
      - "8085:8085"
    env_file:
      - .env.local
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/report_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
    depends_on:
      db-init:
        condition: service_completed_successfully

  notification-service:
    build: ./notification-service/notification
    container_name: notification-service
    ports:
      - "8086:8086"
    env_file:
      - .env.local
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
    depends_on:
      db-init:
        condition: service_completed_successfully

  github-service:
    build: ./github-service/github
    container_name: github-service
    ports:
      - "8087:8087"
    env_file:
      - .env.local
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/github_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
    depends_on:
      db-init:
        condition: service_completed_successfully

  jira-service:
    build: ./jira-service/jira
    container_name: jira-service
    ports:
      - "8088:8088"
    env_file:
      - .env.local
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jira_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
    depends_on:
      db-init:
        condition: service_completed_successfully

  export-service:
    build: ./export-service
    container_name: export-service
    ports:
      - "8089:8089"
    env_file:
      - .env.local
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/export_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
    depends_on:
      db-init:
        condition: service_completed_successfully

  file-service:
    build: ./file-service
    container_name: file-service
    ports:
      - "8090:8090"
    env_file:
      - .env.local
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/file_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
      CLOUDFLARE_R2_PUBLIC_DOMAIN: ${CLOUDFLARE_R2_PUBLIC_DOMAIN}
      CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY}
      CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}
    depends_on:
      db-init:
        condition: service_completed_successfully