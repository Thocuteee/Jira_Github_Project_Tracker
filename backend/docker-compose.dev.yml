services:
  frontend:
    build:
      args:
        VITE_API_GATEWAY_URL: http://localhost
        VITE_AUTH_SERVICE_URL: http://localhost
        VITE_GROUP_SERVICE_URL: http://localhost/api/groups
        VITE_REQUIREMENT_SERVICE_URL: http://localhost/api/requirements
        VITE_TASK_SERVICE_URL: http://localhost/api/tasks
        VITE_REPORT_SERVICE_URL: http://localhost/api/reports
        VITE_NOTIFICATION_SERVICE_URL: http://localhost/api/notifications
        VITE_GITHUB_SERVICE_URL: http://localhost/api/github
        VITE_JIRA_SERVICE_URL: http://localhost/api/jira
        VITE_EXPORT_SERVICE_URL: http://localhost/api/export

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LOCAL_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASS:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    environment:
      FRONTEND_URL: http://localhost
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS:-postgres}
    depends_on:
      - postgres
      - rabbitmq

  group-service:
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/group_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${LOCAL_DB_PASS:-postgres}
    depends_on:
      - postgres
      - rabbitmq

  requirement-service:
