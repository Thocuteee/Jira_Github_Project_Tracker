      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/requirement_db
      SPRING_DATASOURCE_USERNAME: ${LOCAL_DB_USER:-postgres}
