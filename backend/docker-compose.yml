services:
  # ==========================================
  # HẠ TẦNG DÙNG CHUNG
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"

  # ==========================================
  # FRONTEND & API GATEWAY
  # ==========================================
  frontend:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/frontend:latest
    build:
      context: ../frontend
      args:
        VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL}
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL}
        VITE_GROUP_SERVICE_URL: ${VITE_GROUP_SERVICE_URL}
        VITE_REQUIREMENT_SERVICE_URL: ${VITE_REQUIREMENT_SERVICE_URL}
        VITE_TASK_SERVICE_URL: ${VITE_TASK_SERVICE_URL}
        VITE_REPORT_SERVICE_URL: ${VITE_REPORT_SERVICE_URL}
        VITE_NOTIFICATION_SERVICE_URL: ${VITE_NOTIFICATION_SERVICE_URL}
        VITE_GITHUB_SERVICE_URL: ${VITE_GITHUB_SERVICE_URL}
        VITE_JIRA_SERVICE_URL: ${VITE_JIRA_SERVICE_URL}
        VITE_EXPORT_SERVICE_URL: ${VITE_EXPORT_SERVICE_URL}
    container_name: frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api-gateway

  api-gateway:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/api-gateway:latest
    build: ./api-gateway/gateway
    container_name: api-gateway
    restart: always
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}

  # ==========================================
  # CORE SERVICES (Microservices)
  # ==========================================
  auth-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/auth-service:latest
    build: ./auth-service/auth
    container_name: auth-service
    restart: always
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_AUTH}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_AUTH}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_AUTH}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - redis
      - rabbitmq

  group-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/group-service:latest
    build: ./group-service
    container_name: group-service
    restart: always
    ports:
      - "${GROUP_SERVICE_PORT:-8082}:8082"
    environment:
      SERVER_PORT: 8082
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_GROUP}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_GROUP}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_GROUP}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}

  requirement-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/requirement-service:latest
    build: ./requirement-service/requirement
    container_name: requirement-service
    restart: always
    ports:
      - "${REQUIREMENT_SERVICE_PORT:-8083}:8083"
    environment:
      SERVER_PORT: 8083
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_REQUIREMENT}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_REQUIREMENT}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_REQUIREMENT}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}

  task-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/task-service:latest
    build: ./task-service/task
    container_name: task-service
    restart: always
    ports:
      - "${TASK_SERVICE_PORT:-8084}:8084"
    environment:
      SERVER_PORT: 8084
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_TASK}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_TASK}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_TASK}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
      CLOUDFLARE_R2_PUBLIC_DOMAIN: ${CLOUDFLARE_R2_PUBLIC_DOMAIN}
      CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY}
      CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}

  report-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/report-service:latest
    build: ./report-service/report
    container_name: report-service
    restart: always
    ports:
      - "${REPORT_SERVICE_PORT:-8085}:8085"
    environment:
      SERVER_PORT: 8085
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_REPORT}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_REPORT}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_REPORT}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}

  notification-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/notification-service:latest
    build: ./notification-service/notification
    container_name: notification-service
    restart: always
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8086}:8086"
    environment:
      SERVER_PORT: 8086
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_NOTIFICATION}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_NOTIFICATION}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_NOTIFICATION}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}

  github-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/github-service:latest
    build: ./github-service/github
    container_name: github-service
    restart: always
    ports:
      - "${GITHUB_SERVICE_PORT:-8087}:8087"
    environment:
      SERVER_PORT: 8087
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_GITHUB}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_GITHUB}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_GITHUB}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      - rabbitmq

  jira-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/jira-service:latest
    build: ./jira-service/jira
    container_name: jira-service
    restart: always
    ports:
      - "${JIRA_SERVICE_PORT:-8088}:8088"
    environment:
      SERVER_PORT: 8088
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_JIRA}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_JIRA}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_JIRA}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      JIRA_API_URL: ${JIRA_API_URL}
      JIRA_USERNAME: ${JIRA_USERNAME}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      - rabbitmq

  export-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/export-service:latest
    build: ./export-service/
    container_name: export-service
    restart: always
    ports:
      - "${EXPORT_SERVICE_PORT:-8089}:8089"
    environment:
      SERVER_PORT: 8089
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_EXPORT}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_EXPORT}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_EXPORT}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
      CLOUDFLARE_R2_PUBLIC_DOMAIN: ${CLOUDFLARE_R2_PUBLIC_DOMAIN}
      CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY}
      CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}

  file-service:
    image: ${IMAGE_PREFIX:-ghcr.io/thocuteee/jira_github_project_tracker}/file-service:latest
    build: ./file-service
    container_name: file-service
    restart: always
    ports:
      - "${FILE_SERVICE_PORT:-8090}:8090"
    environment:
      SERVER_PORT: 8090
      JWT_SECRET_KEY: ${JWT_SECRET:-dev-secret-change-me}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_FILE:-jdbc:postgresql://postgres:5432/file_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_FILE:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS_FILE:-1234}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
      CLOUDFLARE_R2_PUBLIC_DOMAIN: ${CLOUDFLARE_R2_PUBLIC_DOMAIN}
      CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY}
      CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-gateway
      - auth-service