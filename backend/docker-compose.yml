version: "3.8"
services:
  # Database cho Export Service
  export-db:
    image: postgres:15
    container_name: export-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${MY_DB_USER}
      POSTGRES_PASSWORD: ${MY_DB_PASS}
      POSTGRES_DB: export_db
    volumes:
      - export_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d export_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  export_db_data:
