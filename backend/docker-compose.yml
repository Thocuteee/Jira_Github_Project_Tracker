# Database cho Group Service
  group-db:
    image: postgres:15
    container_name: group-db
    ports:
      - "5435:5432" # Dùng port 5435 để không đụng với 5433 (auth) và 5434 (notification)
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: group_db
    volumes:
      - group_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d group_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Group Service
  group-service:
    build: 
      context: ./group-service # Trỏ đúng vào thư mục backend/group-service
      dockerfile: Dockerfile
    container_name: group-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      group-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://group-db:5432/group_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  auth_db_data:
  notification_db_data:
  group_db_data: