spring.application.name=notification-service

# Port theo diagram: Notification-Service = 8086
server.port=${SERVER_PORT:8086}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Resend email delivery
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:no-reply@example.com}
resend.from-name=${RESEND_NAME:Hệ thống SWP391 UTH}
resend.enabled=${RESEND_ENABLED:true}

# Firebase Admin (FCM). JSON service account as Base64 (env FIREBASE_CREDENTIALS_BASE64).
# Optional fallback: FIREBASE_CREDENTIALS_PATH to a file on disk.
firebase.credentials.base64=${FIREBASE_CREDENTIALS_BASE64:}

# Override local (optional)
spring.config.import=optional:classpath:application-local.properties
