spring.application.name=export-service
server.port=${SERVER_PORT:8089}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/export_db}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.profiles.active=local

aws.s3.bucket=swp391-export-bucket
aws.s3.region=ap-southeast-1
aws.s3.access-key=${MINIO_ROOT_USER:}
aws.s3.secret-key=${MINIO_ROOT_PASSWORD:}

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:}
spring.rabbitmq.password=${RABBITMQ_PASS:}

rabbitmq.exchange.name=export_exchange
rabbitmq.routing.key=export_routing_key

app.requirement-service.url=${REQUIREMENT_SERVICE_URL:http://requirement-service:8083}
app.file-service.url=${FILE_SERVICE_URL:http://file-service:8090}
app.group-service.url=${GROUP_SERVICE_URL:http://group-service:8082}
app.auth-service.url=${AUTH_SERVICE_URL:http://auth-service:8081}