version: "3.8"
services:
  minio:
    image: minio/minio:latest
    container_name: export_minio_cloud
    ports:
      - "9000:9000" # cong API de upload/download file
      - "9001:9001" # cong giao dien web console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
