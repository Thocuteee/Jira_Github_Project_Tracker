events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Docker DNS: re-resolve upstream container IPs.
    # Without this, Nginx may keep an old container IP after a container restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream auth_service_upstream {
        zone auth_service_upstream 64k;
        server auth-service:8081 resolve;
    }

    upstream api_gateway_upstream {
        zone api_gateway_upstream 64k;
        server api-gateway:8080 resolve;
    }

    upstream frontend_upstream {
        zone frontend_upstream 64k;
        server frontend:80 resolve;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 swp391.uth.today;

        # Forward /api/auth to auth-service directly (OAuth2)
        location /api/auth/ {
            proxy_pass http://auth_service_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Reduce transient 502s while upstream is starting/restarting
            proxy_connect_timeout 2s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 10;
            proxy_next_upstream_timeout 15s;
        }

        # Forward all other /api requests to api-gateway
        location /api/ {
            proxy_pass http://api_gateway_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other requests (frontend)
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
