events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    # Docker DNS: re-resolve upstream container IPs after restarts.
    # valid=60s: tra cứu lại ít hơn — valid=10s dễ gặp log "could not be resolved (2: Server failure)"
    # khi 127.0.0.11 trả SERVFAIL tạm (auth-service restart / tải DNS Docker).
    resolver 127.0.0.11 valid=60s ipv6=off;
    resolver_timeout 10s;

    upstream auth_service_upstream {
        zone auth_service_upstream 64k;
        server auth-service:8081 resolve;
    }

    upstream api_gateway_upstream {
        zone api_gateway_upstream 64k;
        server api-gateway:8080 resolve;
    }

    upstream frontend_upstream {
        zone frontend_upstream 64k;
        server frontend:80 resolve;
    }

    upstream rabbitmq_mgmt_upstream {
        zone rabbitmq_mgmt_upstream 64k;
        server rabbitmq:15672 resolve;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 swp391.uth.today;

        # Forward /api/auth to auth-service directly (OAuth2)
        location /api/auth/ {
            proxy_pass http://auth_service_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # If behind Cloudflare/HTTPS, preserve original scheme for Spring {baseUrl}
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;

            # Reduce transient 502s while upstream is starting/restarting
            proxy_connect_timeout 2s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 10;
            proxy_next_upstream_timeout 15s;
        }

        # Forward all other /api requests to api-gateway
        location /api/ {
            proxy_pass http://api_gateway_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # All other requests (frontend)
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    server {
        listen 80;
        server_name rabbitmq-swp391.uth.today;

        # Cùng pattern với auth/api/frontend: server ... resolve + resolver 127.0.0.11 ở http {}
        # để không [emerg] host not found khi RabbitMQ chưa sẵn sàng lúc Nginx start.
        location / {
            proxy_pass http://rabbitmq_mgmt_upstream;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
