events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Docker DNS: re-resolve upstream container IPs
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name swp391.uth.today;

        # Forward /api/auth to auth-service directly (fixed for OAuth2)
        location /api/auth/ {
            # No trailing slash: preserve original request URI (/api/auth/...)
            set $auth_upstream http://auth-service:8081;
            proxy_pass $auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Forward all other /api requests to api-gateway
        location /api/ {
            # No trailing slash: preserve original request URI (/api/...)
            set $api_upstream http://api-gateway:8080;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other requests (frontend)
        location / {
            set $fe_upstream http://frontend:80;
            proxy_pass $fe_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
