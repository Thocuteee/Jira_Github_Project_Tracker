server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${GATEWAY_CORS_ALLOWED_ORIGIN:http://localhost:5173}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: group-service
          uri: ${GROUP_SERVICE_URL:http://group-service:8082}
          predicates:
            - Path=/api/groups/**
        - id: requirement-service
          uri: ${REQUIREMENT_SERVICE_URL:http://requirement-service:8083}
          predicates:
            - Path=/api/requirements/**
        - id: task-service
          uri: ${TASK_SERVICE_URL:http://task-service:8084}
          predicates:
            - Path=/api/tasks/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8086}
          predicates:
            - Path=/api/notifications/**

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  jwt:
    secret: ${JWT_SECRET_KEY:dev-secret-change-me}
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${GATEWAY_RATE_LIMIT_PER_MIN:120}
  security:
    public-paths:
      - /api/auth/login-user
      - /api/auth/register-user
      - /actuator/health
      - /actuator/info
    protected-paths:
      - /api/groups/**
      - /api/requirements/**
      - /api/tasks/**
      - /api/notifications/**
      - /api/users/**
      - /api/auth/users/**
    role-rules:
      /api/groups/**:
        - ROLE_ADMIN
        - ROLE_LECTURER
        - ROLE_TEAM_LEADER
        - ROLE_TEAM_MEMBER
