server.port=${API_GATEWAY_PORT:8080}
spring.application.name=api-gateway
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration

# Multipart upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

jwt.secret=${JWT_SECRET_KEY:${JWT_SECRET:dev-secret-change-me}}

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=https://swp391.uth.today,http://localhost:*,http://127.0.0.1:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Redis Configuration for Gateway (Blacklist & Rate Limiting)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

spring.cloud.gateway.routes[1].id=group-service
spring.cloud.gateway.routes[1].uri=http://group-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/groups/**,/api/v1/groups/**

spring.cloud.gateway.routes[2].id=requirement-service
spring.cloud.gateway.routes[2].uri=http://requirement-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/requirements/**,/api/v1/requirements/**

spring.cloud.gateway.routes[3].id=task-service
spring.cloud.gateway.routes[3].uri=http://task-service:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/tasks/**,/api/v1/tasks/**

spring.cloud.gateway.routes[4].id=report-service
spring.cloud.gateway.routes[4].uri=http://report-service:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/reports/**,/api/v1/reports/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=http://notification-service:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**,/api/v1/notifications/**

spring.cloud.gateway.routes[6].id=github-service
