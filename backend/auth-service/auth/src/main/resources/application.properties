# application.properties (File nĂ y push lĂŞn GitHub)
server.port=${SERVER_PORT:8081}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

jwt.secret=${JWT_SECRET_KEY:${JWT_SECRET:dev-secret-change-me}}
jwt.expiration=${JWT_EXPIRATION:86400000}
uth.app.jwtRefreshExpirationMs=${JWT_REFRESH_EXPIRATION:604800000}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
# Important: Spring's default redirect_uri is {baseUrl}/login/oauth2/code/{registrationId}.
# Our app serves OAuth callback under /api/auth/login/oauth2/code/{registrationId}.
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/login/oauth2/code/{registrationId}

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:local-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:local-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/api/auth/login/oauth2/code/{registrationId}

# Custom redirect target after OAuth2 success/failure.
# Use a PATH (not an absolute URL) to avoid env/localhost traps.
# The success/failure handlers will convert this into an absolute URL using
# X-Forwarded-Proto/Host (Cloudflare/Nginx) or the current request origin.
app.oauth2.redirectUri=/oauth2/redirect

# CĂˇc cáşĄu hĂ¬nh khĂˇc giá»Ż nguyĂŞn
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.forward-headers-strategy=framework